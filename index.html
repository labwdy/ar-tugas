<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Tugas Kuliah</title>

  <script scr="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script scr="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene embedded arjs>
  <a-marker preset="hiro">
    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" postion="1 1 1" intensity="1"></a-light>

    <a-entity
      gltf-model="url(cat.glb)"
      position="0.5 0.8 0.3"
      scale=" 1 1 1"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
    </a-entity>

  </a-marker>
  <a-entity camera></a-entity>
</a-scene>

</body>
</html>
